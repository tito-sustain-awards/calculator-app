<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="calculator-shell">
    <section class="calculator-card">
      <div class="calculator-header">
        <div>
          <p class="app-title">Modern Calculator</p>
          <p class="app-subtitle">Clean, responsive, fast</p>
        </div>
      </div>
      <div class="screen" id="screen">
        <div class="screen-history" id="history"></div>
        <div class="screen-value" id="display">0</div>
      </div>
      <div class="button-grid">
        <button class="button button-ac" data-action="clear">AC</button>
        <button class="button button-plusminus" data-action="toggle-sign">±</button>
        <button class="button button-percent" data-action="percent">%</button>
        <button class="button button-operator" data-action="divide">÷</button>

        <button class="button" data-digit="7">7</button>
        <button class="button" data-digit="8">8</button>
        <button class="button" data-digit="9">9</button>
        <button class="button button-operator" data-action="multiply">×</button>

        <button class="button" data-digit="4">4</button>
        <button class="button" data-digit="5">5</button>
        <button class="button" data-digit="6">6</button>
        <button class="button button-operator" data-action="subtract">−</button>

        <button class="button" data-digit="1">1</button>
        <button class="button" data-digit="2">2</button>
        <button class="button" data-digit="3">3</button>
        <button class="button button-operator" data-action="add">+</button>

        <button class="button button-zero" data-digit="0">0</button>
        <button class="button" data-action="decimal">.</button>
        <button class="button button-equals" data-action="equals">=</button>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
