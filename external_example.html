<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora API Example</title>
  <style>
    body { font-family: Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #111827; color: white; margin: 0; }
    .container { width: min(420px, 100%); background: #1f2937; padding: 24px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.45); }
    label, button { display: block; width: 100%; margin-bottom: 12px; }
    input, select { width: 100%; padding: 10px 12px; border-radius: 12px; border: 1px solid #374151; background: #111827; color: white; }
    button { cursor: pointer; border: none; background: #3b82f6; color: white; padding: 12px; border-radius: 12px; }
    .result { margin-top: 16px; padding: 16px; background: #111827; border: 1px solid #374151; border-radius: 12px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>API Calculator Demo</h1>
    <label>
      Operación
      <select id="action">
        <option value="add">Sumar</option>
        <option value="subtract">Restar</option>
        <option value="multiply">Multiplicar</option>
        <option value="divide">Dividir</option>
        <option value="percent">Porcentaje</option>
        <option value="toggle-sign">Cambiar signo</option>
      </select>
    </label>
    <label>
      Izquierda
      <input id="left" type="number" step="any" value="12" />
    </label>
    <label>
      Derecha / Valor
      <input id="right" type="number" step="any" value="3" />
    </label>
    <button id="calculate">Calcular</button>
    <div class="result" id="result">Resultado: -</div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api/calc';
    const actionSelect = document.getElementById('action');
    const leftInput = document.getElementById('left');
    const rightInput = document.getElementById('right');
    const resultDiv = document.getElementById('result');
    const calculateButton = document.getElementById('calculate');

    const renderResult = (text) => {
      resultDiv.textContent = `Resultado: ${text}`;
    };

    const updateFields = () => {
      const action = actionSelect.value;
      if (action === 'percent' || action === 'toggle-sign') {
        rightInput.disabled = true;
        rightInput.value = '';
      } else {
        rightInput.disabled = false;
      }
    };

    actionSelect.addEventListener('change', updateFields);
    updateFields();

    calculateButton.addEventListener('click', async () => {
      const action = actionSelect.value;
      const left = leftInput.value;
      const right = rightInput.value;
      const payload = {
        action,
      };
      if (action === 'percent' || action === 'toggle-sign') {
        payload.value = left;
      } else {
        payload.left = left;
        payload.right = right;
      }

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Error de API');
        }
        renderResult(data.result);
      } catch (error) {
        renderResult(error.message);
      }
    });
  </script>
</body>
</html>
